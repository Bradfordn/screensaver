<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LCSS Screensaver Settings</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      padding: 20px;
      background-color: #1a1a1a;
      color: #ffffff;
      width: 320px;
    }
    h3 {
      margin-top: 0;
      border-bottom: 1px solid #444;
      padding-bottom: 8px;
    }
    .form-group {
      margin: 15px 0;
    }
    .master-toggle-group {
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed #555;
      padding: 10px;
      margin: 15px 0;
      display: flex;
      align-items: center;
    }
    .master-toggle-group input {
      margin-right: 10px;
      cursor: pointer;
      transform: scale(1.2);
    }
    .checkbox-group {
      margin: 15px 0;
      display: flex;
      align-items: center;
    }
    .checkbox-group input {
      margin-right: 8px;
      cursor: pointer;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .checkbox-group label, .master-toggle-group label {
      display: inline;
      margin-bottom: 0;
      cursor: pointer;
    }
    .master-toggle-group label {
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 8px;
      background: #333;
      color: white;
      border: 1px solid #555;
      font-family: inherit;
    }
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      margin-top: 10px;
    }
    button:hover {
      background: #45a049;
    }
    #status {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #4caf50;
      text-align: center;
      height: 15px;
    }
  </style>
</head>
<body>
  <h3>Screensaver Settings</h3>
  
  <div class="master-toggle-group">
    <input type="checkbox" id="screensaverEnabled" checked>
    <label for="screensaverEnabled">Enable Screensaver</label>
  </div>

  <div class="form-group">
    <label for="timeout">Idle Timeout Delay:</label>
    <select id="timeout">
      <option value="1">1 Minute</option>
      <option value="2">2 Minutes</option>
      <option value="5" selected>5 Minutes</option>
      <option value="10">10 Minutes</option>
      <option value="15">15 Minutes</option>
    </select>
  </div>

  <div class="form-group">
    <label for="clockPosition">Clock Alignment:</label>
    <select id="clockPosition">
      <option value="center">Absolute Center Layout</option>
      <option value="bottom-left">Bottom Left Corner</option>
      <option value="top-left">Top Left Corner</option>
    </select>
  </div>

  <div class="form-group">
    <label for="weatherPosition">Weather Alignment:</label>
    <select id="weatherPosition">
      <option value="bottom-right">Bottom Right Dashboard Corner</option>
      <option value="top-right">Top Right Corner</option>
    </select>
  </div>

  <div class="form-group">
    <label for="font-select">Dashboard Typography:</label>
    <select id="font-select">
      <option value="Space Mono">Space Mono (Retro Coding)</option>
      <option value="Syncopate">Syncopate (Ultra-Wide Modern)</option>
      <option value="Special Elite">Special Elite (Vintage Typewriter)</option>
      <option value="Kumar One">Kumar One (Industrial Block)</option>
      <option value="Bruno Ace">Bruno Ace (Futuristic Sci-Fi)</option>
    </select>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="showWeather" checked>
    <label for="showWeather">Display weather feeds</label>
  </div>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
